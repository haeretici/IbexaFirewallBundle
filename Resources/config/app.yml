parameters:
    haeretici_firewall.admin.controller.class: Haeretici\FirewallBundle\Controller\AdminController

services:
    _defaults:
        autowire: true
    Haeretici\FirewallBundle\Controller\AdminController:
        public: true
        class: Haeretici\FirewallBundle\Controller\AdminController
        parent: Ibexa\Core\MVC\Symfony\Controller\Controller
        arguments:
            - '@cache.redis'
            - '@doctrine'
            - '@Haeretici\FirewallBundle\Lib\ConfigService'
            - '@Ibexa\Contracts\AdminUi\Notification\TranslatableNotificationHandlerInterface'
    Haeretici\FirewallBundle\EventListener\MenuListener:
        class: Haeretici\FirewallBundle\EventListener\MenuListener
        arguments:
            - '@security.authorization_checker'
            - '@Ibexa\Contracts\AdminUi\Menu\MenuItemFactoryInterface'
        tags:
            - { name: kernel.event_subscriber }
    Haeretici\FirewallBundle\EventListener\KernelListener:
        class: Haeretici\FirewallBundle\EventListener\KernelListener
        arguments:
            - '@cache.redis'
            - '@Haeretici\FirewallBundle\Lib\ConfigService'
            - '%kernel.secret%'
        tags:
            - { name: 'kernel.event_listener', event: 'kernel.request', method: 'onKernelRequest', priority: 33 }
            - { name: 'kernel.event_listener', event: 'kernel.response', method: 'onKernelResponse' }

    Haeretici\FirewallBundle\Command\StoreDataCommand:
        class: Haeretici\FirewallBundle\Command\StoreDataCommand
        arguments:
            - '@cache.redis'
            - '@doctrine'
        tags:
            - { name: console.command }

    Haeretici\FirewallBundle\Command\SeedDemoDataCommand:
        class: Haeretici\FirewallBundle\Command\SeedDemoDataCommand
        arguments:
            - '@cache.redis'
            - '@doctrine'
        tags:
            - { name: console.command }

    Haeretici\FirewallBundle\Lib\ConfigService:
        arguments:
            $doctrine: '@doctrine'
            $cache: '@cache.redis'
            $defaults: '%haeretici_firewall.defaults%'
